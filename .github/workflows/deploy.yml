name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build static portfolio
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare static files
        run: |
          mkdir -p _site

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='_site' \
            --exclude='.DS_Store' \
            ./ _site/

          if [ ! -f _site/index.html ]; then
            cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Portfolio Deployment Started</title>
              <style>
                body {
                  margin: 0;
                  min-height: 100vh;
                  display: grid;
                  place-items: center;
                  font-family: Arial, sans-serif;
                  background: linear-gradient(135deg, #0f172a, #2563eb);
                  color: white;
                  text-align: center;
                }

                main {
                  max-width: 720px;
                  padding: 40px;
                }

                h1 {
                  font-size: clamp(2rem, 6vw, 4rem);
                  margin-bottom: 12px;
                }

                p {
                  font-size: 1.1rem;
                  opacity: 0.9;
                }
              </style>
            </head>
            <body>
              <main>
                <h1>Portfolio CI/CD Started</h1>
                <p>The GitHub Actions workflow is working. The full portfolio will appear after the next development commits.</p>
              </main>
            </body>
          </html>
          HTML
          fi

          touch _site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy artifact to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4